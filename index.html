<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All About Barkley</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class= "main">
        <h1>Welcome To Barkley's Page!</h1>

         <div class="infoContainer"> 
            <h2> All About Barkley</h2> 
            <p> Barkley is a young toy poodle. He is very polite, well behaved, and obsessed with treats.</p>
            <a  href="https://en.wikipedia.org/wiki/Poodle">Some more info about poodles</a>
         </div>
         
        <div class="listContainer">
            <h2> His favorite foods are: </h2>
            <ol style="list-style: none;">
                <li>Ham.</li>
                <li>Cucumber.</li>
                <li>Cheese.</li>
                <li>Apples.</li>
                <li>Peanut butter treats.</li>
            </ol>
        </div>
           
        <h1>Pictures of Barkley</h1>

        <div class="imageContainer">              
            <figure>
                <img src="images/barkley_in_the_sun.jpeg" alt="Barkley In The Sun" >
                <figcaption>Barkley is enjoying the sun!</figcaption>
            </figure>

            <figure>
                <img src="images/barkley_snack.jpeg" alt="barkley_snack" >
                <figcaption>Barkley eating a pup-cup.</figcaption>
            </figure>

            <figure>
                <img src="images/barkley_chair.jpeg" alt="barkley_chair" >
                <figcaption>Barkley posing on a cafe chair.</figcaption>
            </figure>

            <figure>
                <img src="images/barkley_car_bed.jpeg" alt="barkley_car_bed" >
                <figcaption>Barkley in the car. </figcaption>
            </figure>
        </div>
       

    </main>
