<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barkley's Photos</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/lightbox.css">
</head>


<body>

    <a href="#main-content" class="offpage">Skip to main content</a>

    <header id="top-of-page">
        <Nav>   
            <img src="images/barkley_framed.jpg" alt= "Framed Photo of Barkley's face">
            <div class="navbar">
                <h1> Photo Gallery</h1>    
                <ul>
                    <li class="button"> <a href="index.html">Home</a> </li>
                    <li class="button" id="navbar-hightlight" > <a href="photo_gallery.html">Photo Gallery</a></li>
                    <li class="button"> <a href="adventure.html"> Adventures</a></li>
                </ul>
            </div>
        </Nav>
    </header>

    <main id="main-content">
        <div class="infobox">
            <h2> Welcome to The Photo Gallery</h2>
            <p>
            This gallery is host to many diffrent photos of barkley durning his day to day life.
            We are just waiting for his modelling carrer to take off. Enjoy!
            </p>
        </div>

        <div class="gallery">

            <figure>
                <a 
                    href= "images/modelling/barkley_bday.jpg" 
                    data-lightbox= "gallery">
                    <img src="images/modelling/barkley_bday.jpg" alt="Barkley with a birthday present.">
                </a>
                <figcaption>Birthday Boy!</figcaption>
            </figure>

            <figure>
                <a 
                    href= "images/modelling/barkley_bow.jpg"
                    data-lightbox= "gallery">
                     <img src="images/modelling/barkley_bow.jpg" alt="barkley wearing a bow tie, after just finishing a grooming">
                </a>   
                <figcaption>Fresh from the groomers</figcaption>
            </figure>

            <figure>
                <a 
                    href= "images/modelling/barkley_in_the_sun.jpeg"
                    data-lightbox= "gallery">
                    <img src="images/modelling/barkley_in_the_sun.jpeg" alt="Barkley relaxing in the sun outside">
                </a>   
                <figcaption>Out in the sun!</figcaption>
            </figure>

            <figure>
                <a 
                    href= "images/modelling/barkly_in_the_sun.jpg"
                    data-lightbox= "gallery">
                    <img src="images/modelling/barkly_in_the_sun.jpg" alt="Barkley taking a nap on the floor, in the sun.">
                </a>         
                <figcaption>Sleeping in the warm sun</figcaption>
            </figure>

            <figure>
                <a 
                    href= "images/modelling/puppy_dog_eyes.jpg"
                    data-lightbox= "gallery">
                    <img src="images/modelling/puppy_dog_eyes.jpg" alt="Barkley giving 'puppy-dog' eyes">
                </a> 
                <figcaption>Puppy dog eyes</figcaption>
            </figure>

            <figure>
                <a 
                    href= "images/modelling/barkley_bed.jpg"
                    data-lightbox= "gallery">
                    <img src="images/modelling/barkley_bed.jpg" alt="Barkley in his bead.">
                </a>        
                <figcaption>Laying in bed</figcaption>
            </figure>

        </div>
        
    </main>


    <!-- must contain back to top link and info-->
    <footer>
        <div class="infobox">     
            <a href="#top-of-page">Back to top</a>
        </div>

<script src="js/lightbox-plus-jquery.js"></script>
